<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoCoMiro</title>
    <link data-trunk rel="rust" />
    <style>
      :root {
        font-family: Inter, "Segoe UI", Arial, sans-serif;
        color: #0f172a;
        background:
          radial-gradient(circle at top left, #dbeafe 0%, transparent 42%),
          linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        padding: clamp(12px, 2vw, 20px);
      }

      .app-shell {
        width: min(1600px, 100%);
        min-height: calc(100vh - (2 * clamp(12px, 2vw, 20px)));
        margin: 0 auto;
        display: grid;
      }

      .canvas-panel {
        padding: 10px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.8);
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
        backdrop-filter: blur(8px);
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 0;
      }

      .canvas-status {
        margin: 0 0 10px;
        color: #475569;
        font-size: 0.95rem;
      }

      .canvas-workspace {
        position: relative;
        min-height: 65vh;
      }

      #infinite-canvas {
        display: block;
        width: 100%;
        height: 100%;
        min-height: 65vh;
        border: 1px solid #cbd5e1;
        border-radius: 16px;
        background: #f8fafc;
        cursor: grab;
        outline: none;
      }

      #infinite-canvas:focus {
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.18);
      }

      .floating-toolbar {
        position: absolute;
        top: 0;
        left: 0;
        z-index: 2;
        width: 58px;
        min-height: 220px;
        padding: 10px 0 14px;
        border: 1px solid rgba(148, 163, 184, 0.6);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.14);
        backdrop-filter: blur(10px);
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        gap: 10px;
        user-select: none;
        touch-action: none;
        cursor: default;
      }

      .floating-toolbar__handle {
        width: 28px;
        height: 18px;
        border-radius: 999px;
        background:
          radial-gradient(circle, rgba(148, 163, 184, 0.95) 30%, transparent 31%) center / 14px 8px repeat-x;
        opacity: 0.9;
        cursor: grab;
      }
    </style>
  </head>
  <body></body>
</html>
