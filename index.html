<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoCoMiro</title>
    <link data-trunk rel="rust" />
    <style>
      :root {
        font-family: Inter, "Segoe UI", Arial, sans-serif;
        color: #0f172a;
        background:
          radial-gradient(circle at top left, #dbeafe 0%, transparent 42%),
          linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        padding: clamp(12px, 2vw, 20px);
      }

      .app-shell {
        width: min(1600px, 100%);
        min-height: calc(100vh - (2 * clamp(12px, 2vw, 20px)));
        margin: 0 auto;
        display: grid;
      }

      .canvas-panel {
        padding: 10px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.8);
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
        backdrop-filter: blur(8px);
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 0;
      }

      .canvas-status {
        margin: 0 0 10px;
        color: #475569;
        font-size: 0.95rem;
      }

      #infinite-canvas {
        display: block;
        width: 100%;
        height: 100%;
        min-height: 65vh;
        border: 1px solid #cbd5e1;
        border-radius: 16px;
        background: #f8fafc;
        cursor: grab;
        outline: none;
      }

      #infinite-canvas:focus {
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.18);
      }
    </style>
  </head>
  <body></body>
</html>
